<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet Details – BGS.GG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0b1a; --surface: #16132a; --card: #1e1a35; --border: #2e2850;
      --pink: #ff4fa3; --purple: #a855f7; --blue: #38bdf8; --yellow: #fbbf24;
      --green: #34d399; --red: #f87171; --text: #f0eaff; --muted: #8b80b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(2px 2px at 40% 80%, rgba(168,85,247,0.3) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,11,26,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; height: 62px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-right: auto; }
    .nav-logo span {
      font-family: 'Baloo 2', cursive; font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: var(--muted); font-weight: 700; font-size: 0.875rem;
      text-decoration: none; padding: 8px 14px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: rgba(168,85,247,0.15); }
    .nav-discord {
      margin-left: 12px;
      background: linear-gradient(135deg, #5865F2, #7983f5) !important;
      color: #fff !important; border-radius: 8px !important; padding: 7px 14px !important;
    }
    .nav-lock { margin-left: 8px; font-size: 16px; opacity: 0.35; text-decoration: none; transition: opacity 0.2s; padding: 8px 6px; }
    .nav-lock:hover { opacity: 0.8; }

    /* BACK BTN */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none; font-weight: 700; font-size: 0.875rem;
      padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--card); transition: all 0.2s; margin: 28px 0 0 0;
    }
    .back-btn:hover { color: var(--text); border-color: var(--purple); }

    /* LAYOUT */
    .page { max-width: 1000px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }

    /* PET HERO */
    .pet-hero {
      display: flex; gap: 32px; align-items: flex-start;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px; margin: 24px 0;
    }
    .pet-hero-img {
      width: 140px; height: 140px; flex-shrink: 0;
      border-radius: 18px; background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .pet-hero-img img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: screen; }
    .pet-hero-img .placeholder {
      font-size: 1rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .pet-hero-info { flex: 1; }
    .pet-hero-name {
      font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800; margin-bottom: 8px;
    }
    .rarity-tag {
      display: inline-block; border-radius: 8px; padding: 3px 12px;
      font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 16px;
    }
    .r-secret    { background: rgba(239,68,68,0.2);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .r-legendary { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .r-limited   { background: rgba(255,79,163,0.15); color: var(--pink); border: 1px solid rgba(255,79,163,0.3); }
    .r-rare      { background: rgba(56,189,248,0.12); color: var(--blue); border: 1px solid rgba(56,189,248,0.25); }

    .pet-stats-row { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
    .pet-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; min-width: 110px;
    }
    .pet-stat-label { color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .pet-stat-value { font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800; color: var(--yellow); }
    .pet-stat-value.shiny { color: var(--blue); }
    .pet-stat-value.exists { color: var(--green); }
    .pet-stat-value.na { color: var(--muted); font-size: 1rem; }

    /* TREND */
    .trend-up     { color: var(--green); }
    .trend-down   { color: var(--red); }
    .trend-stable { color: var(--blue); }

    /* DEMAND BAR */
    .demand-wrap { margin-top: 16px; }
    .demand-label { color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .demand-bar-bg {
      height: 10px; background: var(--surface); border-radius: 999px;
      border: 1px solid var(--border); overflow: hidden; width: 220px;
    }
    .demand-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      transition: width 0.8s ease;
    }
    .demand-text { font-weight: 800; font-size: 0.875rem; margin-top: 5px; color: var(--text); }

    /* GRID */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } .pet-hero { flex-direction: column; } }

    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px;
    }
    .panel-title {
      font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .panel-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
    }

    /* CHART */
    .chart-wrap { position: relative; height: 200px; }

    /* EXISTS */
    .exists-row { display: flex; gap: 16px; }
    .exists-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .exists-num { font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800; color: var(--green); }
    .exists-num.shiny { color: var(--blue); }
    .exists-lbl { color: var(--muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

    /* HISTORY LIST */
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(46,40,80,0.5);
      font-size: 0.85rem;
    }
    .history-item:last-child { border-bottom: none; }
    .history-change { font-weight: 700; }
    .old-val { color: var(--muted); text-decoration: line-through; margin-right: 6px; }
    .new-val { color: var(--green); }
    .history-date { color: var(--muted); font-size: 0.72rem; }
    .history-reason { color: var(--blue); font-size: 0.72rem; font-style: italic; }

    /* LOADING */
    .loading { color: var(--muted); font-size: 0.875rem; padding: 20px 0; }
    .error-msg { color: var(--red); font-size: 0.875rem; padding: 20px 0; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><span>BGS.GG</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/pets">Pets</a>
    <a href="#" class="nav-discord">Discord</a>
    <a href="/admin/login" class="nav-lock" title="Admin" target="_blank">🔒</a>
  </div>
</nav>

<div class="page">
  <a href="/pets" class="back-btn">← Back to Value List</a>

  <div id="content"><div class="loading">Loading pet...</div></div>
</div>

<script>
  const API = 'https://ogbgsvalues.up.railway.app';
  const petId = window.location.pathname.split('/').pop();

  function formatValue(v) {
    if (!v || v === 'null' || v === '0') return '0';
    const upper = v.toString().toUpperCase().trim();
    if (upper === 'N/A') return 'N/A';
    if (upper === 'O/C') return 'O/C';
    const num = parseFloat(v);
    if (isNaN(num)) return v;
    if (num >= 1000) return num.toLocaleString();
    return num.toString();
  }

  function rarityClass(r) {
    if (r === 'Secret')    return 'r-secret';
    if (r === 'Legendary') return 'r-legendary';
    if (r === 'Limited')   return 'r-limited';
    return 'r-rare';
  }

  function trendIcon(t) {
    if (t === 'up')   return '<span class="trend-up">▲ Rising</span>';
    if (t === 'down') return '<span class="trend-down">▼ Falling</span>';
    return '<span class="trend-stable">● Stable</span>';
  }

  function demandLabel(d) {
    if (d >= 9) return 'Extreme';
    if (d >= 7) return 'Very High';
    if (d >= 5) return 'High';
    if (d >= 3) return 'Medium';
    if (d >= 1) return 'Low';
    return 'None';
  }

  function switchMode(mode) {
    const valDisplay    = document.getElementById('val-display');
    const existsDisplay = document.getElementById('exists-display');
    const petImg        = document.getElementById('pet-main-img');
    const btnNormal     = document.getElementById('btn-normal');
    const btnShiny      = document.getElementById('btn-shiny');
    if (!valDisplay) return;

    if (mode === 'shiny') {
      valDisplay.textContent     = window._petShiny;
      valDisplay.style.color     = 'var(--blue)';
      existsDisplay.textContent  = window._existsShiny;
      btnShiny.style.background  = 'linear-gradient(135deg,#38bdf8,#a855f7)';
      btnShiny.style.color       = '#fff';
      btnNormal.style.background = 'transparent';
      btnNormal.style.color      = 'var(--muted)';
      if (petImg && window._shinyImg) {
        petImg.src = window._shinyImg;
      }
    } else {
      valDisplay.textContent     = window._petNormal;
      valDisplay.style.color     = 'var(--yellow)';
      existsDisplay.textContent  = window._existsNormal;
      btnNormal.style.background = 'linear-gradient(135deg,var(--pink),var(--purple))';
      btnNormal.style.color      = '#fff';
      btnShiny.style.background  = 'transparent';
      btnShiny.style.color       = 'var(--muted)';
      if (petImg && window._normalImg) {
        petImg.src = window._normalImg;
      }
    }
  }

  async function load() {
    try {
      const [petRes, histRes] = await Promise.all([
        fetch(`${API}/api/pets/${petId}`),
        fetch(`${API}/api/history/${petId}?limit=20`)
      ]);
      const pet     = await petRes.json();
      const history = await histRes.json();

      document.title = `${pet.name} – BGS.GG`;

      const demand     = pet.demand || 0;
      const demandPct  = (demand / 10) * 100;
      const imgHtml    = pet.image_url
        ? `<img id="pet-main-img" src="${pet.image_url}" alt="${pet.name}">`
        : `<div class="placeholder">${pet.name.split(' ').map(w=>w[0]).join('')}</div>`;

      document.getElementById('content').innerHTML = `
        <div class="pet-hero">
          <div class="pet-hero-img">${imgHtml}</div>
          <div class="pet-hero-info">
            <div class="pet-hero-name">${pet.name}</div>
            <span class="rarity-tag ${rarityClass(pet.rarity)}">${pet.rarity}</span>
            ${pet.note ? `<div style="font-size:0.8rem;color:var(--pink);font-weight:700;margin-bottom:12px;">${pet.note}</div>` : ''}

            <!-- NORMAL / SHINY TOGGLE -->
            <div style="display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content;margin-bottom:16px;">
              <button id="btn-normal" onclick="switchMode('normal')"
                style="padding:7px 20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;border:none;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;">
                Normal
              </button>
              <button id="btn-shiny" onclick="switchMode('shiny')"
                style="padding:7px 20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;border:none;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--muted);">
                ✨ Shiny
              </button>
            </div>

            <div class="pet-stats-row">
              <div class="pet-stat">
                <div class="pet-stat-label" id="val-label">Value</div>
                <div class="pet-stat-value" id="val-display">${formatValue(pet.value)}</div>
              </div>
              <div class="pet-stat">
                <div class="pet-stat-label" id="exists-label">Exists</div>
                <div class="pet-stat-value exists" id="exists-display">${pet.exists_normal || 0}</div>
              </div>
              <div class="pet-stat">
                <div class="pet-stat-label">Trend</div>
                <div class="pet-stat-value" style="font-size:0.95rem;">${trendIcon(pet.trend || 'stable')}</div>
              </div>
            </div>
            <div class="demand-wrap">
              <div class="demand-label">Demand</div>
              <div class="demand-bar-bg">
                <div class="demand-bar-fill" style="width:${demandPct}%"></div>
              </div>
              <div class="demand-text">${demand}/10 — ${demandLabel(demand)}</div>
            </div>
          </div>
        </div>

        <div class="detail-grid">
          <div class="panel" style="grid-column: 1 / -1;">
            <div class="panel-title"><div class="dot"></div>Value History</div>
            ${history.length > 1
              ? `<div class="chart-wrap"><canvas id="valueChart"></canvas></div>`
              : `<div style="color:var(--muted);font-size:0.875rem;">Not enough data yet to show a chart.</div>`
            }
          </div>
          <div class="panel">
            <div class="panel-title"><div class="dot"></div>Existence Count</div>
            <div class="exists-row">
              <div class="exists-card">
                <div class="exists-num">${pet.exists_normal || 0}</div>
                <div class="exists-lbl">Normal</div>
              </div>
              <div class="exists-card">
                <div class="exists-num shiny">${pet.exists_shiny || 0}</div>
                <div class="exists-lbl">Shiny</div>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-title"><div class="dot"></div>Recent Changes</div>
            ${history.length === 0
              ? `<div style="color:var(--muted);font-size:0.875rem;">No changes recorded yet.</div>`
              : history.slice(0, 8).map(h => `
                <div class="history-item">
                  <div>
                    <div class="history-change">
                      <span class="old-val">${h.old_value}</span>
                      → <span class="new-val">${h.new_value}</span>
                    </div>
                    ${h.reason ? `<div class="history-reason">"${h.reason}"</div>` : ''}
                  </div>
                  <div class="history-date">${h.changed_at.slice(0,10)}</div>
                </div>
              `).join('')
            }
          </div>
        </div>
      `;

      // Store values for toggle
      window._petNormal    = formatValue(pet.value);
      window._petShiny     = pet.shiny_value ? formatValue(pet.shiny_value) : 'N/A';
      window._existsNormal = pet.exists_normal || 0;
      window._existsShiny  = pet.exists_shiny  || 0;
      window._normalImg    = pet.image_url || null;
      window._shinyImg     = pet.shiny_image_url || pet.image_url || null;

      // Draw chart if enough data
      if (history.length > 1) {
        const numericHistory = history
          .filter(h => !isNaN(parseFloat(h.new_value)))
          .reverse();

        if (numericHistory.length > 1) {
          const ctx = document.getElementById('valueChart').getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: numericHistory.map(h => h.changed_at.slice(0,10)),
              datasets: [{
                label: 'Value',
                data: numericHistory.map(h => parseFloat(h.new_value)),
                borderColor: '#a855f7',
                backgroundColor: 'rgba(168,85,247,0.1)',
                borderWidth: 2,
                pointBackgroundColor: '#ff4fa3',
                pointRadius: 4,
                fill: true,
                tension: 0.4,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
              },
              scales: {
                x: {
                  ticks: { color: '#8b80b0', font: { family: 'Nunito', size: 11 } },
                  grid: { color: 'rgba(46,40,80,0.5)' },
                },
                y: {
                  ticks: { color: '#8b80b0', font: { family: 'Nunito', size: 11 } },
                  grid: { color: 'rgba(46,40,80,0.5)' },
                }
              }
            }
          });
        }
      }

    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div class="error-msg">Could not load pet. Make sure the backend is running.</div>`;
    }
  }

  load();
</script>

</body>
</html>
